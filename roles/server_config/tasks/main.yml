- name: force apt update and upgrade
  command: apt-get update
  become: true

- name: upgrade packages
  apt:
    upgrade: dist
  become: true

- name: install required system packages
  apt:
    pkg:
      - ca-certificates
      - curl
      - gnupg
      - ufw
    state: present
  become: true

- name: create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  become: true

- name: add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker-archive-keyring.gpg
  args:
    creates: /etc/apt/keyrings/docker-archive-keyring.gpg
  become: true

- name: add Docker repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable\n"
  become: true

- name: update apt cache after adding Docker repo
  apt:
    update_cache: yes
    cache_valid_time: 0
  become: true

- name: verify docker-ce is available
  command: apt-cache policy docker-ce
  become: true

- name: Install Docker engine and compose
  apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  become: true

- name: start and enable Docker service
  service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Set default policies for UFW
  ufw:
    state: reset
  become: true

- name: Allow ports through UFW
  ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: tcp
  loop:
    - { port: 22 }
    - { port: 80 }
    - { port: 443 }
  become: true

- name: Enable UFW default deny incoming
  ufw:
    state: enabled
    policy: deny
    direction: incoming
  become: true

- name: force UFW to active state
  shell: ufw --force enable
  become: true